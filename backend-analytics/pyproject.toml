[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: tests that require a real database connection",
    "unit: fast tests without external dependencies",
]
addopts = "-v --strict-markers"
filterwarnings = [
    "ignore:builtin type SwigPy:DeprecationWarning",
]

[tool.coverage.run]
source = ["domain", "application", "infrastructure"]
omit = [
    "tests/*",
    "venv/*",
    "infrastructure/database/*",
    "infrastructure/logging_config.py",
    "config.py",
    "server.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["venv/", "legacy/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
