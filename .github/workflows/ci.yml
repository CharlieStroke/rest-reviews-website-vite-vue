name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-analytics:
    name: Python tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend-analytics/requirements.txt') }}
          restore-keys: pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests
        run: python -m pytest tests/unit/ -q --cov=. --cov-report=term-missing --cov-fail-under=80

  test-node:
    name: Node tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend-node/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: [test-analytics, test-node]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/rest-reviews-website-vite-vue
            git pull origin master
            docker compose up -d --build backend-node backend-analytics
