name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-analytics:
    name: Python tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend-analytics/requirements.txt
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests
        run: python -m pytest tests/unit/ -q --cov=. --cov-report=term-missing --cov-fail-under=80

  test-node:
    name: Node tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test-analytics, test-node]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend-node
        uses: docker/build-push-action@v5
        with:
          context: ./backend-node
          push: false
          cache-from: type=gha,scope=backend-node
          cache-to: type=gha,scope=backend-node,mode=max
      - name: Build backend-analytics
        uses: docker/build-push-action@v5
        with:
          context: ./backend-analytics
          push: false
          cache-from: type=gha,scope=backend-analytics
          cache-to: type=gha,scope=backend-analytics,mode=max

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/rest-reviews-website-vite-vue
            git pull origin master
            docker compose up -d --build backend-node backend-analytics
